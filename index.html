<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>我的記帳</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="color-scheme" content="light" />

  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="我的記帳" />

  <link rel="stylesheet" href="styles.css" />
  <script>
    // Capture beforeinstallprompt as early as possible — module scripts defer,
    // so without this, Chrome may fire the event before main.js attaches.
    window.__deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.__deferredInstallPrompt = e;
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script type="module" src="js/main.js" defer></script>
</head>
<body>
  <div id="toast-container" aria-live="polite"></div>

  <section id="auth-screen" class="auth-screen" hidden>
    <div class="auth-card">
      <h1 class="auth-title">💰 我的記帳</h1>
      <p class="auth-subtitle">登入後將資料安全儲存在雲端</p>

      <div class="auth-tabs" role="tablist">
        <button type="button" class="auth-tab active" data-mode="login" role="tab">登入</button>
        <button type="button" class="auth-tab" data-mode="register" role="tab">註冊</button>
      </div>

      <form id="auth-form" autocomplete="on">
        <label class="field">
          <span>Email</span>
          <input type="email" name="email" autocomplete="email" required placeholder="you@example.com" />
        </label>
        <label class="field">
          <span>密碼</span>
          <input type="password" name="password" autocomplete="current-password" required minlength="6" placeholder="至少 6 字元" />
        </label>
        <button type="submit" id="auth-submit" class="btn btn-primary auth-submit">登入</button>
        <p id="auth-error" class="auth-error" hidden></p>
      </form>
    </div>
  </section>

  <div id="app-root" hidden>
    <header class="app-header">
      <div id="user-bar" class="user-bar" hidden>
        <span class="user-email" id="user-email"></span>
        <button type="button" id="logout-btn" class="btn btn-ghost btn-small">登出</button>
      </div>
      <h1>💰 我的記帳</h1>
      <p class="subtitle">簡單、私密的個人記帳網站</p>
      <button type="button" id="install-btn" class="install-btn">
        <span aria-hidden="true">📲</span>
        <span>安裝為 App</span>
      </button>
      <p id="install-hint" class="install-hint">
        按鈕無反應時，從 Chrome 右上 ⋮ 選單 →「安裝應用程式」
      </p>
    </header>

    <main class="container">
      <section class="summary" aria-label="本月摘要">
        <article class="summary-card income">
          <span class="label">本月收入</span>
          <span id="summary-income" class="value">$0</span>
        </article>
        <article class="summary-card expense">
          <span class="label">本月支出</span>
          <span id="summary-expense" class="value">$0</span>
        </article>
        <article class="summary-card balance">
          <span class="label">本月結餘</span>
          <span id="summary-balance" class="value">$0</span>
        </article>
      </section>

      <section class="summary investment-summary" aria-label="本月投資">
        <article class="summary-card profit">
          <span class="label">投資獲利</span>
          <span id="summary-inv-profit" class="value">$0</span>
        </article>
        <article class="summary-card loss">
          <span class="label">投資虧損</span>
          <span id="summary-inv-loss" class="value">$0</span>
        </article>
        <article class="summary-card net">
          <span class="label">投資淨損益</span>
          <span id="summary-inv-net" class="value">$0</span>
        </article>
      </section>

      <section class="content-grid">
        <div class="panel form-panel">
          <h2 id="form-title">新增記帳</h2>
          <form id="record-form" autocomplete="off">
            <input type="hidden" name="recordId" value="" />

            <fieldset class="type-toggle">
              <legend class="visually-hidden">類型</legend>
              <label class="radio-tab">
                <input type="radio" name="type" value="expense" checked />
                <span>支出</span>
              </label>
              <label class="radio-tab">
                <input type="radio" name="type" value="income" />
                <span>收入</span>
              </label>
              <label class="radio-tab">
                <input type="radio" name="type" value="investment" />
                <span>投資</span>
              </label>
            </fieldset>

            <div id="normal-fields">
              <label class="field">
                <span>金額</span>
                <input
                  type="number"
                  name="amount"
                  min="0.01"
                  step="0.01"
                  required
                  placeholder="0"
                  inputmode="decimal"
                />
              </label>

              <label class="field">
                <span>類別</span>
                <select name="category" required></select>
              </label>

              <label class="field">
                <span>商家 <small>(選填)</small></span>
                <input type="text" name="merchant" maxlength="60" placeholder="星巴克、全聯…" />
              </label>
            </div>

            <div id="investment-fields" hidden>
              <label class="field">
                <span>股票名稱</span>
                <input type="text" name="stockName" maxlength="30" placeholder="台積電、2330…" />
              </label>

              <label class="field">
                <span>張數 <small>(1 張 = 1000 股，可填小數)</small></span>
                <input type="number" name="lots" min="0.001" step="0.001" placeholder="1" inputmode="decimal" />
              </label>

              <div class="field-row">
                <label class="field">
                  <span>買進價</span>
                  <input type="number" name="buyPrice" min="0.01" step="0.01" placeholder="100" inputmode="decimal" />
                </label>
                <label class="field">
                  <span>賣出價</span>
                  <input type="number" name="sellPrice" min="0.01" step="0.01" placeholder="110" inputmode="decimal" />
                </label>
              </div>

              <label class="field">
                <span>券商手續費折數 <small>(0.6 = 6 折)</small></span>
                <input type="number" name="feeDiscount" min="0" max="1" step="0.01" value="0.6" inputmode="decimal" />
              </label>

              <output id="pnl-preview" class="pnl-preview" aria-live="polite">填入欄位後即時計算損益…</output>
            </div>

            <label class="field">
              <span>日期</span>
              <input type="date" name="date" required />
            </label>

            <label class="field">
              <span>備註 <small>(選填)</small></span>
              <input type="text" name="note" maxlength="100" placeholder="午餐、加油…" />
            </label>

            <div class="form-actions">
              <button type="submit" id="submit-btn" class="btn btn-primary">新增</button>
              <button type="button" id="cancel-edit-btn" class="btn btn-ghost" hidden>取消</button>
            </div>
          </form>
        </div>

        <div class="panel charts-panel">
          <div class="chart-wrap">
            <canvas id="category-chart"></canvas>
          </div>
          <div class="chart-wrap">
            <canvas id="trend-chart"></canvas>
          </div>
        </div>
      </section>

      <section class="panel list-panel">
        <div class="list-header">
          <h2>記帳明細</h2>
          <div class="toolbar">
            <label class="inline-field">
              <span>月份</span>
              <select id="month-filter"></select>
            </label>
            <button type="button" id="export-csv-btn" class="btn btn-ghost">📄 匯出 CSV</button>
            <button type="button" id="backup-btn" class="btn btn-ghost">💾 備份</button>
            <label class="btn btn-ghost file-btn">
              ♻️ 還原
              <input type="file" id="restore-input" accept="application/json,.json" hidden />
            </label>
          </div>
        </div>

        <div class="table-wrap">
          <table class="record-table">
            <thead>
              <tr>
                <th>日期</th>
                <th>類型</th>
                <th>類別</th>
                <th>商家</th>
                <th class="align-right">金額</th>
                <th>備註</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="record-list-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <small>資料儲存於雲端資料庫，僅本人帳號可存取。</small>
    </footer>
  </div>
</body>
</html>
